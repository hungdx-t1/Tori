name: Auto Build on Commit

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build Core version
        run: mvn -B package -DskipTests --file pom.xml

      - name: Build Full DAVE version
        run: mvn -B package -P dave-build -DskipTests --file pom.xml

      # Upload toàn bộ JAR (Lấy cả thư mục extension-dave luôn)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tori-Build-${{ github.sha }}
          path: |
            tori-api/target/*.jar
            tori-server/target/*.jar
            tori-extension-dave/target/*.jar