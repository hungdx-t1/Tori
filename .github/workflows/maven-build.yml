# .github/workflows/maven-build.yml

name: Auto Build on Commit

# trigger: run when push on main/master
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # download source code to virtual machine
      - uses: actions/checkout@v4

      # install java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # run build with skip test
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      # upload jar (expires on 90d)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DianxinCore-Build-${{ github.sha }} # rename file with commit ID
          path: |
            tori-api/target/*.jar
            tori-server/target/*.jar