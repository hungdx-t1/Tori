# .github/workflows/maven-release.yml

name: Build & Release DianxinCore

# run when publish release
on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # grant permission to put file on release

    steps:
      # download source code to virtual machine
      - uses: actions/checkout@v4

      # install java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Cache library to build faster on future

      # run build
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      # upload jar
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            tori-api/target/tori-api-*.jar
            tori-server/target/tori-server.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}